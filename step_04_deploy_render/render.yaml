services:
  - type: web
    name: medical-nlp-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn step_04_deploy_render.app:app --host 0.0.0.0 --port $PORT"
    
    # Free tier settings
    plan: free
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: HF_HOME
        value: /tmp/huggingface  # Cache models in /tmp (persists between requests)
    
    # Health check — Render pings this to know if your app is up
    healthCheckPath: /health
